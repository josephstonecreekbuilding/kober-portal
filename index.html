<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kober Residence — StoneCreek Building Co.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --stone: #2C2825;
    --stone-light: #5C524A;
    --cream: #F8F5F0;
    --warm-white: #FDFCFA;
    --sand: #E8E0D4;
    --accent: #8B6F47;
    --accent-light: #C4A882;
    --accent-pale: #F0E8DB;
    --green: #4A7C59;
    --green-pale: #E8F2EC;
    --amber: #C17B2E;
    --amber-pale: #FBF0E0;
    --red: #B84040;
    --red-pale: #FAEAEA;
    --blue: #3D6B9C;
    --blue-pale: #E8EFF8;
    --border: rgba(44,40,37,0.10);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--cream);
    color: var(--stone);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .site-header {
    background: var(--stone);
    color: var(--warm-white);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    height: 42px;
    width: auto;
    display: block;
    mix-blend-mode: screen;
    opacity: 0.92;
  }
  .site-header .job-label {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── NAV TABS ── */
  .nav-bar {
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0;
    padding: 0 32px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav-bar::-webkit-scrollbar { display: none; }
  .nav-tab {
    padding: 0 24px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--stone-light);
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    user-select: none;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }
  .nav-tab:hover { color: var(--stone); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .nav-tab .tab-icon { font-size: 16px; }

  /* ── SECTIONS ── */
  .section { display: none; padding: 32px; max-width: 1100px; margin: 0 auto; }
  .section.active { display: block; }

  /* ── DAILY LOGS ── */
  .stats-row {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 24px;
    flex: 1;
    min-width: 140px;
  }
  .stat-card .stat-val {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--stone);
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-card .stat-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--stone-light);
  }
  .stat-card.photos-btn {
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    border-color: var(--accent-light);
    background: var(--accent-pale);
  }
  .stat-card.photos-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
  }
  .stat-card.photos-btn:hover .stat-val,
  .stat-card.photos-btn:hover .stat-label { color: white; }
  .stat-card.photos-btn .stat-val { color: var(--accent); }
  .stat-card.photos-btn .stat-label { color: var(--accent); }

  .log-list { display: flex; flex-direction: column; gap: 12px; }
  .log-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .log-card:hover { box-shadow: 0 2px 12px rgba(44,40,37,0.08); }
  .log-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
  }
  .log-date {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    min-width: 80px;
  }
  .log-super {
    font-size: 13px;
    color: var(--stone-light);
    flex: 1;
  }
  .log-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 20px;
    background: var(--accent-pale);
    color: var(--accent);
    white-space: nowrap;
  }
  .log-photo-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--stone-light);
    white-space: nowrap;
  }
  .log-chevron {
    font-size: 14px;
    color: var(--stone-light);
    transition: transform 0.2s;
  }
  .log-card.open .log-chevron { transform: rotate(180deg); }
  .log-body { display: none; border-top: 1px solid var(--border); padding: 20px; }
  .log-card.open .log-body { display: block; }
  .log-field { margin-bottom: 16px; }
  .log-field:last-child { margin-bottom: 0; }
  .field-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--stone-light);
    margin-bottom: 6px;
  }
  .field-value {
    font-size: 14px;
    line-height: 1.65;
    color: var(--stone);
    white-space: pre-wrap;
  }
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 8px;
    margin-top: 8px;
  }
  .photo-thumb {
    aspect-ratio: 1;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    background: var(--sand);
    position: relative;
  }
  .photo-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.2s;
  }
  .photo-thumb:hover img { opacity: 0.85; }
  .photo-thumb .expand-icon {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.3);
    color: white;
    font-size: 18px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .photo-thumb:hover .expand-icon { opacity: 1; }

  /* ── SCHEDULE / CALENDAR ── */
  .cal-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .cal-nav {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .cal-nav-btn {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 34px;
    height: 34px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--stone);
    transition: background 0.15s;
  }
  .cal-nav-btn:hover { background: var(--sand); }
  .cal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--stone);
    min-width: 160px;
    text-align: center;
  }
  .view-switcher {
    display: flex;
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .view-btn {
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--stone-light);
    background: none;
    border: none;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .view-btn + .view-btn { border-left: 1px solid var(--border); }
  .view-btn.active { background: var(--accent); color: white; }
  .cal-legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 500;
    color: var(--stone-light);
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .legend-dot.done { background: var(--green); }
  .legend-dot.inprogress { background: var(--amber); }
  .legend-dot.upcoming { background: var(--accent-light); }

  /* ── MONTHLY VIEW ── */
  .cal-month {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .cal-dow-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
  }
  .cal-dow {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--stone-light);
    padding: 10px 0;
    background: var(--cream);
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }
  .cal-cell {
    min-height: 90px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 6px 5px 4px;
    vertical-align: top;
    overflow: hidden;
  }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell.other-month { background: var(--cream); opacity: 0.5; }
  .cal-cell.today { background: #fffbf5; }
  .cal-day-num {
    font-size: 12px;
    font-weight: 600;
    color: var(--stone-light);
    margin-bottom: 3px;
    line-height: 1;
  }
  .cal-cell.today .cal-day-num {
    background: var(--accent);
    color: white;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
  }
  .cal-event {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 5px;
    border-radius: 3px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: default;
    line-height: 1.4;
  }
  .cal-event.done { background: var(--green-pale); color: var(--green); }
  .cal-event.inprogress { background: var(--amber-pale); color: var(--amber); }
  .cal-event.upcoming { background: var(--accent-pale); color: var(--accent); }
  .cal-event.cont {
    border-radius: 0;
    opacity: 0.7;
  }
  .cal-event.start { border-radius: 3px 0 0 3px; }
  .cal-event.end { border-radius: 0 3px 3px 0; }
  .cal-more {
    font-size: 10px;
    color: var(--stone-light);
    font-weight: 500;
    padding: 1px 4px;
    cursor: pointer;
  }
  .cal-more:hover { color: var(--accent); }

  /* ── WEEKLY VIEW ── */
  .cal-week {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .week-col-header {
    display: grid;
    border-bottom: 1px solid var(--border);
    background: var(--cream);
  }
  .week-day-head {
    padding: 10px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--stone-light);
    border-right: 1px solid var(--border);
    text-align: center;
  }
  .week-day-head:last-child { border-right: none; }
  .week-day-head.today-head { color: var(--accent); }
  .week-body { display: grid; }
  .week-day-cell {
    padding: 10px 8px;
    border-right: 1px solid var(--border);
    min-height: 120px;
  }
  .week-day-cell:last-child { border-right: none; }
  .week-day-cell.today-cell { background: #fffbf5; }

  /* ── YEARLY VIEW ── */
  .cal-year {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .mini-month {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .mini-month-title {
    font-family: 'DM Serif Display', serif;
    font-size: 14px;
    text-align: center;
    padding: 10px;
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    color: var(--stone);
  }
  .mini-dow-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
  }
  .mini-dow {
    text-align: center;
    font-size: 9px;
    font-weight: 600;
    color: var(--stone-light);
    padding: 5px 0;
    letter-spacing: 0.05em;
  }
  .mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .mini-cell {
    text-align: center;
    padding: 4px 2px;
    font-size: 10px;
    color: var(--stone-light);
    position: relative;
    cursor: default;
  }
  .mini-cell.other-month { opacity: 0.3; }
  .mini-cell.has-event { font-weight: 700; color: var(--stone); }
  .mini-cell.today-mini {
    background: var(--accent);
    color: white;
    border-radius: 50%;
    font-weight: 700;
  }
  .mini-cell .mini-dot-row {
    display: flex;
    justify-content: center;
    gap: 2px;
    margin-top: 1px;
    height: 4px;
  }
  .mini-dot {
    width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0;
  }
  .mini-dot.done { background: var(--green); }
  .mini-dot.inprogress { background: var(--amber); }
  .mini-dot.upcoming { background: var(--accent-light); }

  /* ── EVENT TOOLTIP ── */
  .event-tooltip {
    position: fixed;
    background: var(--stone);
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.5;
    max-width: 220px;
    pointer-events: none;
    z-index: 500;
    display: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .event-tooltip.visible { display: block; }
  .event-tooltip strong { font-size: 13px; display: block; margin-bottom: 3px; }

  /* ── DECISIONS ── */
  .decisions-intro {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .decisions-intro .icon { font-size: 24px; flex-shrink: 0; }
  .decisions-intro p { font-size: 14px; line-height: 1.65; color: var(--stone-light); }
  .decisions-intro strong { color: var(--stone); }
  .decisions-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .decision-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    border-left: 4px solid transparent;
    transition: box-shadow 0.15s;
  }
  .decision-card:hover { box-shadow: 0 2px 12px rgba(44,40,37,0.08); }
  .decision-card.urgent { border-left-color: var(--red); }
  .decision-card.high { border-left-color: var(--amber); }
  .decision-card.medium { border-left-color: var(--blue); }
  .decision-card.low { border-left-color: var(--sand); }
  .decision-card.decided { border-left-color: var(--green); opacity: 0.7; }
  .decision-body { flex: 1; }
  .decision-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--stone);
    margin-bottom: 5px;
  }
  .decision-desc {
    font-size: 13px;
    color: var(--stone-light);
    line-height: 1.55;
    margin-bottom: 10px;
  }
  .decision-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .priority-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .priority-tag.urgent { background: var(--red-pale); color: var(--red); }
  .priority-tag.high { background: var(--amber-pale); color: var(--amber); }
  .priority-tag.medium { background: var(--blue-pale); color: var(--blue); }
  .priority-tag.low { background: var(--sand); color: var(--stone-light); }
  .due-date-tag {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--stone-light);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .due-date-tag.overdue { color: var(--red); font-weight: 600; }
  .due-date-tag.soon { color: var(--amber); font-weight: 600; }
  .decided-badge {
    font-size: 11px;
    font-weight: 600;
    background: var(--green-pale);
    color: var(--green);
    padding: 2px 9px;
    border-radius: 20px;
  }
  .decision-status-icon { font-size: 24px; flex-shrink: 0; margin-top: 2px; }

  /* ── PHOTO LIGHTBOX ── */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(20,16,12,0.92);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    padding: 24px;
  }
  .lightbox.open { display: flex; }
  .lightbox-img {
    max-width: 90vw;
    max-height: 75vh;
    object-fit: contain;
    border-radius: 8px;
    display: block;
  }
  .lightbox-nav {
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .lightbox-btn {
    background: rgba(255,255,255,0.15);
    color: white;
    border: none;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .lightbox-btn:hover { background: rgba(255,255,255,0.3); }
  .lightbox-counter {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    min-width: 60px;
    text-align: center;
  }
  .lightbox-close {
    position: fixed;
    top: 20px;
    right: 24px;
    background: rgba(255,255,255,0.15);
    color: white;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .lightbox-caption {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    font-family: 'DM Mono', monospace;
  }

  /* ── PHOTO GALLERY MODAL (all photos) ── */
  .gallery-modal {
    position: fixed;
    inset: 0;
    background: rgba(20,16,12,0.96);
    z-index: 999;
    display: none;
    flex-direction: column;
  }
  .gallery-modal.open { display: flex; }
  .gallery-modal-header {
    background: var(--stone);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .gallery-modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--warm-white);
  }
  .gallery-modal-subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
  }
  .gallery-modal-close {
    background: rgba(255,255,255,0.15);
    color: white;
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .gallery-modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }
  .gallery-day-group { margin-bottom: 28px; }
  .gallery-day-label {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
  }
  .gallery-thumb {
    aspect-ratio: 1;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    background: rgba(255,255,255,0.05);
  }
  .gallery-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.15s;
  }
  .gallery-thumb:hover img { opacity: 0.8; }

  /* ── MOBILE ── */
  @media (max-width: 640px) {

    /* Header */
    .site-header {
      padding: 0 16px;
      height: 56px;
    }
    .header-logo { height: 32px; }
    .site-header .job-label {
      font-size: 11px;
      letter-spacing: 0.05em;
    }

    /* Nav */
    .nav-bar { padding: 0 4px; }
    .nav-tab {
      padding: 0 14px;
      height: 46px;
      font-size: 13px;
      gap: 5px;
    }
    .nav-tab .tab-icon { font-size: 15px; }

    /* Sections */
    .section { padding: 14px 12px; }

    /* Stats */
    .stats-row { margin-bottom: 16px; }
    .stat-card { padding: 14px 18px; }
    .stat-card .stat-val { font-size: 26px; }

    /* Log cards */
    .log-header { padding: 14px 14px; gap: 10px; }
    .log-date { font-size: 15px; min-width: 68px; }
    .log-super { font-size: 12px; }
    .log-chips { display: none; }
    .log-photo-count { font-size: 11px; }
    .log-body { padding: 14px; }
    .field-value { font-size: 13px; }
    .photo-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 6px; }

    /* Calendar toolbar */
    .cal-toolbar {
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
    }
    .cal-nav { justify-content: center; }
    .cal-title { font-size: 17px; }
    .view-switcher { justify-content: center; }
    .view-btn { padding: 7px 16px; font-size: 13px; flex: 1; text-align: center; }

    /* Month calendar — compact cells */
    .cal-cell { min-height: 52px; padding: 4px 2px 2px; }
    .cal-day-num { font-size: 10px; }
    .cal-event { font-size: 8px; padding: 1px 3px; }
    .cal-dow { font-size: 9px; padding: 7px 0; }

    /* Week calendar */
    .week-day-head { font-size: 10px; padding: 7px 4px; }
    .week-day-cell { padding: 6px 4px; min-height: 80px; }

    /* Year calendar */
    .cal-year { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .mini-month-title { font-size: 12px; padding: 7px; }
    .mini-cell { font-size: 9px; padding: 3px 1px; }

    /* Decisions */
    .decisions-intro { padding: 14px 16px; gap: 10px; }
    .decisions-intro .icon { font-size: 20px; }
    .decisions-intro p { font-size: 13px; }
    .decision-card { padding: 14px 14px; gap: 10px; }
    .decision-name { font-size: 14px; }
    .decision-desc { font-size: 12px; }
    .decision-status-icon { font-size: 20px; }

    /* Lightbox */
    .lightbox { padding: 12px; gap: 10px; }
    .lightbox-img { max-width: 96vw; max-height: 65vh; }
    .lightbox-btn { width: 38px; height: 38px; font-size: 18px; }
    .lightbox-close { top: 10px; right: 12px; width: 34px; height: 34px; font-size: 16px; }

    /* Gallery modal */
    .gallery-modal-header { padding: 12px 16px; }
    .gallery-modal-title { font-size: 17px; }
    .gallery-modal-body { padding: 14px 12px; }
    .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 6px; }

    /* Event tooltip — hide on touch, rely on taps instead */
    .event-tooltip { display: none !important; }
  }

  /* Touch-friendly tap targets */
  @media (hover: none) {
    .log-card:hover { box-shadow: none; }
    .decision-card:hover { box-shadow: none; }
    .stat-card.photos-btn:hover { background: var(--accent-pale); border-color: var(--accent-light); }
    .stat-card.photos-btn:hover .stat-val,
    .stat-card.photos-btn:hover .stat-label { color: var(--accent); }
    .stat-card.photos-btn:active { background: var(--accent); border-color: var(--accent); }
    .stat-card.photos-btn:active .stat-val,
    .stat-card.photos-btn:active .stat-label { color: white; }
    .photo-thumb:hover img { opacity: 1; }
    .photo-thumb:active img { opacity: 0.8; }
    .photo-thumb:hover .expand-icon { opacity: 0; }
    .gallery-thumb:hover img { opacity: 1; }
    .gallery-thumb:active img { opacity: 0.75; }
    .cal-nav-btn:hover { background: var(--warm-white); }
    .cal-nav-btn:active { background: var(--sand); }
  }
</style>

// ─── CONFIG ──────────────────────────────────────────────────────────────────
const API_TOKEN = 'BNSJvxNMVlUcwRuIVnMbrE_euqSwgYWKVhlL8NYpy84';
const BOARD_LOGS      = '18414187451';
const BOARD_SCHEDULE  = '18414187576';
const BOARD_DECISIONS = '18417271408';

// Status label maps
const STATUS_INDEX_SCHEDULE  = { 1: 'done', 0: 'inprogress' };
const PRIORITY_LABEL = { 'High': 'high', 'Medium': 'medium', 'Low': 'low', 'Urgent': 'urgent' };
const OUTCOME_LABEL  = { 'Approved': true, 'Rejected': true, 'Decided': true };

// ─── MONDAY API HELPER ───────────────────────────────────────────────────────
async function mondayQuery(query) {
  const res = await fetch('/api/monday', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query })
  });
  if (!res.ok) throw new Error('Proxy HTTP ' + res.status);
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  if (json.errors && json.errors.length) {
    throw new Error(json.errors.map(e => e.message || JSON.stringify(e)).join('; '));
  }
  if (!json.data) throw new Error('No data. Got: ' + JSON.stringify(json).slice(0, 300));
  return json.data;
}

// ─── FETCH LOGS ──────────────────────────────────────────────────────────────
async function fetchLogs() {
  const data = await mondayQuery(`{
    boards(ids: [${BOARD_LOGS}]) {
      items_page(limit: 100) {
        items {
          id name
          column_values { id text value }
        }
      }
    }
  }`);
  const items = data.boards[0].items_page.items;

  // Collect all asset IDs across all items
  const allAssetIds = [];
  const itemAssetMap = {};
  items.forEach(item => {
    const col = id => item.column_values.find(c => c.id === id) || {};
    let assetIds = [];
    try {
      const fv = JSON.parse(col('file_mm3gftma').value || '{}');
      assetIds = (fv.files || []).map(f => String(f.assetId || f.id)).filter(Boolean);
    } catch(e) {}
    itemAssetMap[item.id] = assetIds;
    assetIds.forEach(id => { if (!allAssetIds.includes(id)) allAssetIds.push(id); });
  });

  // Fetch public_url for all assets via Monday assets API (direct S3 signed URLs)
  const publicUrlMap = {};
  for (let i = 0; i < allAssetIds.length; i += 50) {
    const batch = allAssetIds.slice(i, i + 50);
    try {
      const assetData = await mondayQuery(`{ assets(ids: [${batch.join(',')}]) { id public_url } }`);
      (assetData.assets || []).forEach(a => { publicUrlMap[String(a.id)] = a.public_url; });
    } catch(e) { console.error('Asset fetch error:', e); }
  }

  const mapped = items.map(item => {
    const col = id => item.column_values.find(c => c.id === id) || {};
    const photos = (itemAssetMap[item.id] || [])
      .map(id => publicUrlMap[id])
      .filter(Boolean);
    const subsText = col('dropdown_mm46b224').text || '';
    const subs = subsText ? subsText.split(', ').filter(Boolean) : [];
    const rawDate = col('date_mm3g4kss').text || item.name;
    const dateObj = new Date(rawDate + 'T12:00:00');
    const dateDisplay = isNaN(dateObj)
      ? item.name
      : dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    return {
      date: dateDisplay,
      sortDate: rawDate,
      super: col('multiple_person_mm3gm947').text || '',
      subs,
      workCompleted: col('text_mm3gkpt6').text || '',
      notes: col('long_textkpnxmb8b').text || '',
      photos
    };
  });
  mapped.sort((a, b) => b.sortDate.localeCompare(a.sortDate));
  return mapped;
}

// ─── FETCH SCHEDULE ──────────────────────────────────────────────────────────
async function fetchSchedule() {
  const data = await mondayQuery(`{
    boards(ids: [${BOARD_SCHEDULE}]) {
      items_page(limit: 100) {
        items {
          id name
          column_values { id text value }
        }
      }
    }
  }`);
  const items = data.boards[0].items_page.items;
  const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const formatDate = iso => {
    if (!iso) return null;
    const d = new Date(iso + 'T12:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  };
  return items.map(item => {
    const col = id => item.column_values.find(c => c.id === id) || {};
    // Timeline column
    let from = null, to = null;
    try {
      const tv = JSON.parse(col('timerange_mm3hxjw1').value || '{}');
      from = formatDate(tv.from);
      to   = formatDate(tv.to);
    } catch(e) {}
    // Status
    let status = 'upcoming';
    try {
      const sv = JSON.parse(col('status').value || '{}');
      status = STATUS_INDEX_SCHEDULE[sv.index] || 'upcoming';
    } catch(e) {}
    return { name: item.name, from: from || '—', to: to || '—', status };
  }).filter(i => i.from !== '—');
}

// ─── FETCH DECISIONS ─────────────────────────────────────────────────────────
async function fetchDecisions() {
  const data = await mondayQuery(`{
    boards(ids: [${BOARD_DECISIONS}]) {
      items_page(limit: 100) {
        items {
          id name
          column_values { id text value }
        }
      }
    }
  }`);
  const items = data.boards[0].items_page.items;
  return items.map(item => {
    const col = id => item.column_values.find(c => c.id === id) || {};
    // Priority
    const priorityText = col('color_mm443ywr').text || '';
    const priority = PRIORITY_LABEL[priorityText] || 'medium';
    // Decided?
    const outcomeText = col('color_mm44r44y').text || '';
    const statusText  = col('color_mm4449f6').text || '';
    const decided = !!(OUTCOME_LABEL[outcomeText] || statusText === 'Decided');
    // Due date
    const rawDue = col('date_mm44qha8').text || '';
    let dueDate = '', dueSortDate = '';
    if (rawDue) {
      const d = new Date(rawDue + 'T12:00:00');
      dueDate = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      dueSortDate = rawDue;
    }
    const decidedRaw = col('date_mm44wqwj').text || '';
    let decidedDate = '';
    if (decidedRaw) {
      decidedDate = new Date(decidedRaw + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }
    return { name: item.name, desc: col('text_mm44hyna').text || '', priority, dueDate, dueSortDate, decided, decidedDate };
  });
}

// ─── LIVE DATA PLACEHOLDERS (filled by fetchAll) ─────────────────────────────
let LOGS = [];
let SCHEDULE = [];
let DECISIONS = [];

// Fake LOGS array stub so calendar engine below doesn't error before fetch
// ─── GLOBALS ────────────────────────────────────────────────────────────────
let allPhotos = [];
let lightboxPhotos = [];
let lightboxIndex = 0;
let SCHED_PARSED = [];

// Calendar state
let calView = 'month';
let calDate = new Date(); calDate.setDate(1); // current month

// ─── LOADING UI ─────────────────────────────────────────────────────────────
function showLoading(msg) {
  document.getElementById('log-list').innerHTML =
    `<div style="text-align:center;padding:48px 0;color:var(--stone-light);font-size:14px;">${msg}</div>`;
}
function showError(msg) {
  document.getElementById('log-list').innerHTML =
    `<div style="text-align:center;padding:48px 0;color:var(--red);font-size:14px;">⚠ ${msg}</div>`;
}

// ─── PARSE SCHEDULE DATES ────────────────────────────────────────────────────
function buildSchedParsed() {
  const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  SCHED_PARSED = SCHEDULE.map(item => {
    const parseDate = str => {
      if (!str || str === '—') return null;
      const [m, d] = str.split(' ');
      const year = new Date().getFullYear();
      return new Date(year, months[m], parseInt(d));
    };
    return { ...item, fromD: parseDate(item.from), toD: parseDate(item.to) };
  }).filter(i => i.fromD && i.toD);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
async function init() {
  showLoading('Loading project data…');
  try {
    showLoading('Loading daily logs…');
    LOGS = await fetchLogs();
    showLoading('Loading schedule…');
    SCHEDULE = await fetchSchedule();
    showLoading('Loading decisions…');
    DECISIONS = await fetchDecisions();
    buildSchedParsed();
    allPhotos = [];
    LOGS.forEach(log => log.photos.forEach(url => allPhotos.push({ url, date: log.date })));
    document.getElementById('total-photos').textContent = allPhotos.length;
    renderLogs();
    renderCalendar();
    renderDecisions();
  } catch(err) {
    let msg = 'Unknown error';
    try {
      if (err && err.message) msg = err.message;
      else if (typeof err === 'string') msg = err;
      else msg = JSON.stringify(err, Object.getOwnPropertyNames(err));
    } catch(e) { msg = String(err); }
    showError('Could not load data — ' + msg);
    console.error('Portal load error:', err);
  }
}

// ─── CALENDAR ENGINE ─────────────────────────────────────────────────────────
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function setView(v, btn) {
  calView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCalendar();
}

function calNav(dir) {
  if (calView === 'month') {
    calDate = new Date(calDate.getFullYear(), calDate.getMonth() + dir, 1);
  } else if (calView === 'week') {
    calDate = new Date(calDate.getFullYear(), calDate.getMonth(), calDate.getDate() + dir * 7);
  } else if (calView === 'year') {
    calDate = new Date(calDate.getFullYear() + dir, calDate.getMonth(), 1);
  }
  renderCalendar();
}

function renderCalendar() {
  if (calView === 'month') renderMonth();
  else if (calView === 'week') renderWeek();
  else renderYear();
}

function dateKey(d) {
  return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
}

function eventsOnDate(d) {
  const dk = dateKey(d);
  return SCHED_PARSED.filter(e => {
    return dateKey(e.fromD) <= dk && dateKey(e.toD) >= dk;
  });
}

function eventCls(e, d) {
  const dk = dateKey(d);
  const start = dateKey(e.fromD) === dk;
  const end = dateKey(e.toD) === dk;
  if (start && end) return e.status;
  if (start) return e.status + ' start';
  if (end) return e.status + ' end';
  return e.status + ' cont';
}

// ─── MONTH VIEW ──────────────────────────────────────────────────────────────
function renderMonth() {
  const y = calDate.getFullYear(), m = calDate.getMonth();
  document.getElementById('cal-title').textContent = `${MONTH_NAMES[m]} ${y}`;

  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const today = new Date();

  let html = `<div class="cal-month">
    <div class="cal-dow-header">${DOW_SHORT.map(d => `<div class="cal-dow">${d}</div>`).join('')}</div>
    <div class="cal-grid">`;

  // prev month filler
  const prevDays = new Date(y, m, 0).getDate();
  for (let i = firstDay - 1; i >= 0; i--) {
    html += `<div class="cal-cell other-month"><div class="cal-day-num">${prevDays - i}</div></div>`;
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const d = new Date(y, m, day);
    const isToday = dateKey(d) === dateKey(today);
    const events = eventsOnDate(d);
    const MAX_VISIBLE = 3;
    const visible = events.slice(0, MAX_VISIBLE);
    const overflow = events.length - MAX_VISIBLE;

    html += `<div class="cal-cell${isToday ? ' today' : ''}">
      <div class="cal-day-num">${day}</div>
      ${visible.map(e => `<div class="cal-event ${eventCls(e, d)}" 
        onmouseenter="showTooltip(event, '${escHtml(e.name)}', '${e.from}', '${e.to}', '${e.status}')"
        onmouseleave="hideTooltip()">${dateKey(e.fromD) === dateKey(d) ? escHtml(e.name) : '&nbsp;'}</div>`).join('')}
      ${overflow > 0 ? `<div class="cal-more">+${overflow} more</div>` : ''}
    </div>`;
  }

  // next month filler
  const totalCells = firstDay + daysInMonth;
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= remaining; i++) {
    html += `<div class="cal-cell other-month"><div class="cal-day-num">${i}</div></div>`;
  }

  html += `</div></div>`;
  document.getElementById('cal-container').innerHTML = html;
}

// ─── WEEK VIEW ───────────────────────────────────────────────────────────────
function renderWeek() {
  const today = new Date();
  // Find Sunday of the week containing calDate
  const dow = calDate.getDay();
  const sunday = new Date(calDate.getFullYear(), calDate.getMonth(), calDate.getDate() - dow);
  const saturday = new Date(sunday.getFullYear(), sunday.getMonth(), sunday.getDate() + 6);

  const fmt = d => `${MONTH_NAMES[d.getMonth()].slice(0,3)} ${d.getDate()}`;
  document.getElementById('cal-title').textContent = `${fmt(sunday)} – ${fmt(saturday)}, ${saturday.getFullYear()}`;

  const days = [];
  for (let i = 0; i < 7; i++) {
    days.push(new Date(sunday.getFullYear(), sunday.getMonth(), sunday.getDate() + i));
  }

  let html = `<div class="cal-week">
    <div class="week-col-header" style="grid-template-columns:repeat(7,1fr)">
      ${days.map(d => {
        const isTod = dateKey(d) === dateKey(today);
        return `<div class="week-day-head${isTod ? ' today-head' : ''}">${DOW_SHORT[d.getDay()]} ${d.getDate()}</div>`;
      }).join('')}
    </div>
    <div class="week-body" style="display:grid;grid-template-columns:repeat(7,1fr)">
      ${days.map(d => {
        const isTod = dateKey(d) === dateKey(today);
        const events = eventsOnDate(d);
        return `<div class="week-day-cell${isTod ? ' today-cell' : ''}">
          ${events.map(e => `<div class="cal-event ${e.status}" style="margin-bottom:3px"
            onmouseenter="showTooltip(event, '${escHtml(e.name)}', '${e.from}', '${e.to}', '${e.status}')"
            onmouseleave="hideTooltip()">${escHtml(e.name)}</div>`).join('')}
        </div>`;
      }).join('')}
    </div>
  </div>`;

  document.getElementById('cal-container').innerHTML = html;
}

// ─── YEAR VIEW ───────────────────────────────────────────────────────────────
function renderYear() {
  const y = calDate.getFullYear();
  document.getElementById('cal-title').textContent = String(y);
  const today = new Date();

  let html = `<div class="cal-year">`;
  for (let m = 0; m < 12; m++) {
    const firstDay = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const prevDays = new Date(y, m, 0).getDate();

    html += `<div class="mini-month">
      <div class="mini-month-title">${MONTH_NAMES[m]}</div>
      <div class="mini-dow-row">${['S','M','T','W','T','F','S'].map(d => `<div class="mini-dow">${d}</div>`).join('')}</div>
      <div class="mini-grid">`;

    for (let i = firstDay - 1; i >= 0; i--) {
      html += `<div class="mini-cell other-month">${prevDays - i}</div>`;
    }
    for (let day = 1; day <= daysInMonth; day++) {
      const d = new Date(y, m, day);
      const events = eventsOnDate(d);
      const isToday = dateKey(d) === dateKey(today);
      const hasDone = events.some(e => e.status === 'done');
      const hasIP = events.some(e => e.status === 'inprogress');
      const hasUp = events.some(e => e.status === 'upcoming');
      const dots = [
        hasDone ? `<div class="mini-dot done"></div>` : '',
        hasIP ? `<div class="mini-dot inprogress"></div>` : '',
        hasUp ? `<div class="mini-dot upcoming"></div>` : ''
      ].join('');

      html += `<div class="mini-cell${isToday ? ' today-mini' : ''}${events.length ? ' has-event' : ''}">
        ${day}
        ${events.length && !isToday ? `<div class="mini-dot-row">${dots}</div>` : ''}
      </div>`;
    }

    const totalCells = firstDay + daysInMonth;
    const remaining = (7 - (totalCells % 7)) % 7;
    for (let i = 1; i <= remaining; i++) {
      html += `<div class="mini-cell other-month">${i}</div>`;
    }
    html += `</div></div>`;
  }
  html += `</div>`;
  document.getElementById('cal-container').innerHTML = html;
}

// ─── TOOLTIP ─────────────────────────────────────────────────────────────────
function escHtml(str) { return str.replace(/'/g, '&#39;').replace(/"/g, '&quot;'); }

function showTooltip(e, name, from, to, status) {
  const tip = document.getElementById('event-tooltip');
  const labels = { done: '✅ Done', inprogress: '🔄 In Progress', upcoming: '📌 Upcoming' };
  const sameDay = from === to;
  tip.innerHTML = `<strong>${name}</strong>${sameDay ? from : from + ' – ' + to}<br><span style="opacity:0.7">${labels[status]||status}</span>`;
  tip.classList.add('visible');
  positionTooltip(e);
}

function positionTooltip(e) {
  const tip = document.getElementById('event-tooltip');
  const x = Math.min(e.clientX + 12, window.innerWidth - 240);
  const y = Math.min(e.clientY + 12, window.innerHeight - 80);
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
}

function hideTooltip() {
  document.getElementById('event-tooltip').classList.remove('visible');
}

// ─── DECISIONS ───────────────────────────────────────────────────────────────
function renderDecisions() {
  const today = new Date('2026-06-22');
  const container = document.getElementById('decisions-grid');

  const pending = DECISIONS.filter(d => !d.decided);
  const decided = DECISIONS.filter(d => d.decided);

  function urgencyClass(d) {
    if (d.decided) return 'decided';
    const due = new Date(d.dueSortDate);
    const diff = Math.ceil((due - today) / (1000*60*60*24));
    if (diff < 0) return 'urgent';
    if (diff <= 3) return 'urgent';
    return d.priority;
  }

  function dueDateDisplay(d) {
    const due = new Date(d.dueSortDate);
    const diff = Math.ceil((due - today) / (1000*60*60*24));
    if (diff < 0) return `<span class="due-date-tag overdue">⚠ Overdue by ${Math.abs(diff)} day${Math.abs(diff)!==1?'s':''}</span>`;
    if (diff === 0) return `<span class="due-date-tag soon">⚡ Due today</span>`;
    if (diff <= 3) return `<span class="due-date-tag soon">⏰ Due in ${diff} day${diff!==1?'s':''}</span>`;
    return `<span class="due-date-tag">📅 Due ${d.dueDate}</span>`;
  }

  function priorityTag(p) {
    const labels = { urgent: 'Urgent', high: 'High', medium: 'Medium', low: 'Low' };
    return `<span class="priority-tag ${p}">${labels[p]||p}</span>`;
  }

  const allItems = [...pending, ...decided];
  container.innerHTML = allItems.map(d => {
    const uc = urgencyClass(d);
    const icon = d.decided ? '✅' : (uc === 'urgent' ? '🔴' : uc === 'high' ? '🟠' : '🔵');
    return `
      <div class="decision-card ${uc}">
        <div class="decision-status-icon">${icon}</div>
        <div class="decision-body">
          <div class="decision-name">${d.name}</div>
          <div class="decision-desc">${d.desc}</div>
          <div class="decision-meta">
            ${d.decided
              ? `<span class="decided-badge">✓ Decided ${d.decidedDate}</span>`
              : `${priorityTag(d.priority)} ${dueDateDisplay(d)}`
            }
          </div>
        </div>
      </div>`;
  }).join('');
}

// ─── LIGHTBOX (per-log) ──────────────────────────────────────────────────────
function openLightboxFromLog(logIdx, photoIdx) {
  lightboxPhotos = LOGS[logIdx].photos.map(url => ({ url, date: LOGS[logIdx].date }));
  lightboxIndex = photoIdx;
  showLightbox();
}

function openLightbox(photos, idx) {
  lightboxPhotos = photos;
  lightboxIndex = idx;
  showLightbox();
}

function showLightbox() {
  const lb = document.getElementById('lightbox');
  lb.classList.add('open');
  updateLightbox();
  document.addEventListener('keydown', lightboxKeyHandler);
}

function updateLightbox() {
  document.getElementById('lightbox-img').src = lightboxPhotos[lightboxIndex].url;
  document.getElementById('lightbox-counter').textContent = `${lightboxIndex+1} / ${lightboxPhotos.length}`;
  document.getElementById('lightbox-caption').textContent = lightboxPhotos[lightboxIndex].date;
}

function lightboxNav(dir) {
  lightboxIndex = (lightboxIndex + dir + lightboxPhotos.length) % lightboxPhotos.length;
  updateLightbox();
}

function closeLightbox(e) {
  if (e && e.target !== document.getElementById('lightbox') && e.target.tagName !== 'BUTTON') return;
  document.getElementById('lightbox').classList.remove('open');
  document.removeEventListener('keydown', lightboxKeyHandler);
}

function lightboxKeyHandler(e) {
  if (e.key === 'ArrowRight') lightboxNav(1);
  if (e.key === 'ArrowLeft') lightboxNav(-1);
  if (e.key === 'Escape') { document.getElementById('lightbox').classList.remove('open'); }
}

// ─── GALLERY MODAL ───────────────────────────────────────────────────────────
function openGallery() {
  const modal = document.getElementById('gallery-modal');
  const body = document.getElementById('gallery-body');
  document.getElementById('gallery-subtitle').textContent = `${allPhotos.length} photos across ${LOGS.length} days`;

  body.innerHTML = LOGS.map((log, li) => `
    <div class="gallery-day-group">
      <div class="gallery-day-label">${log.date} · ${log.photos.length} photos</div>
      <div class="gallery-grid">
        ${log.photos.map((url, pi) => `
          <div class="gallery-thumb" onclick="openGalleryPhoto(${li}, ${pi})">
            <img src="${url}" loading="lazy" onerror="this.parentElement.style.display='none'">
          </div>`).join('')}
      </div>
    </div>`).join('');

  modal.classList.add('open');
}

function openGalleryPhoto(logIdx, photoIdx) {
  closeGallery();
  openLightboxFromLog(logIdx, photoIdx);
}

function closeGallery() {
  document.getElementById('gallery-modal').classList.remove('open');
}

// ─── TOUCH SWIPE FOR LIGHTBOX ────────────────────────────────────────────────
let touchStartX = 0;
document.getElementById('lightbox').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
document.getElementById('lightbox').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 40) lightboxNav(dx < 0 ? 1 : -1);
}, { passive: true });

// ─── RUN ─────────────────────────────────────────────────────────────────────
init();
</script>
